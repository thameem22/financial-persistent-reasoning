services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fpr
      POSTGRES_PASSWORD: fpr
      POSTGRES_DB: fpr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/fpr-neo4j-password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

volumes:
  pgdata:
  neo4jdata:
